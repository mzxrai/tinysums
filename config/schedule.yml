# Sidekiq Cron Schedule Configuration
#
# Format:
# job_name:
#   cron: "* * * * *"
#   class: "ClassName"
#   args: [argument1, argument2]

# Summarize top HN stories hourly (default adapter)
hourly_hn_stories_summarization:
  cron: "0 * * * *" # Every hour at minute 0
  class: "HnTopStoriesJob"
  args: [30, false] # 30 stories, don't force refresh, default adapter

# Different adapters can be scheduled for different times to compare results
# Uncomment or modify as needed

